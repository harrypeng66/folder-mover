name: Build Windows EXE

on:
  workflow_dispatch:

env:
  APP_NAME: material_image_name_cleaner
  ENTRYPOINT: material_image_name_cleaner.py
  PYTHON_VERSION: "3.11"
  ZIP_NAME: material_image_name_cleaner-win.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Syntax check
        run: python -m py_compile "${{ env.ENTRYPOINT }}"

      - name: Build EXE
        run: |
          pyinstaller --clean --onefile --noconsole --name "${{ env.APP_NAME }}" "${{ env.ENTRYPOINT }}"

      - name: Package distribution
        shell: pwsh
        run: |
          $packageDir = "release"
          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "dist\$env:APP_NAME.exe" $packageDir
          Compress-Archive -Path "$packageDir\*" -DestinationPath $env:ZIP_NAME -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: |
            dist/${{ env.APP_NAME }}.exe
            ${{ env.ZIP_NAME }}
