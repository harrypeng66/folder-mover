name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --clean --onefile --noconsole --name folder_mover folder_mover.py

      - name: Package distribution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\folder_mover.exe release\
          Copy-Item 映射关系模板.csv release\
          Copy-Item run_hidden.vbs release\
          Copy-Item run_windows.bat release\
          Compress-Archive -Path release\* -DestinationPath folder_mover-win.zip -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: folder_mover-windows
          path: |
            dist/folder_mover.exe
            folder_mover-win.zip
